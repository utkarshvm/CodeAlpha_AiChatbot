 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left,#7c3aed 0%,transparent 40%),
        radial-gradient(circle at bottom right,#06b6d4 0%,transparent 40%),
        #0f172a;
    padding:20px;
}

#app{
    width:480px;
    height:760px;
    border-radius:30px;
    overflow:hidden;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(30px);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
        0 20px 60px rgba(0,0,0,.4);
        
    display:flex;
    flex-direction:column;
}

/* HEADER */

#header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-icon{
    width:42px;
    height:42px;
    border-radius:50%;
    background:linear-gradient(135deg,#8b5cf6,#06b6d4);

    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:700;
}

.logo h3{
    color:white;
    font-size:16px;
}

.logo p{
    color:#94a3b8;
    font-size:12px;
}

.status{
    color:#22c55e;
    font-size:13px;
}

/* CHAT AREA */

#messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.msg{
    display:flex;
    gap:10px;
    animation:slideUp .25s ease;
}

.msg.user{
    flex-direction:row-reverse;
}

.avatar{
    width:38px;
    height:38px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;
    font-weight:600;
}

.bot-avatar{
    background:linear-gradient(135deg,#8b5cf6,#06b6d4);
    color:white;
}

.user-avatar{
    background:#1e293b;
    color:white;
}

.bubble{
    max-width:75%;
    padding:14px 18px;
    line-height:1.6;
    font-size:14px;
}

.msg.bot .bubble{
    background:#1e293b;
    color:#f8fafc;
    border-radius:20px 20px 20px 5px;
}

.msg.user .bubble{
    background:linear-gradient(
            135deg,
            #8b5cf6,
            #6366f1
    );
    color:white;
    border-radius:20px 20px 5px 20px;
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* SUGGESTIONS */

#suggestions{
    padding:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    border-top:1px solid rgba(255,255,255,.05);
}

.chip{
    background:rgba(255,255,255,.06);
    color:#cbd5e1;
    border:none;

    padding:10px 14px;
    border-radius:999px;
    cursor:pointer;

    transition:.3s;
    font-size:13px;
}

.chip:hover{
    background:#8b5cf6;
    color:white;
    transform:translateY(-2px);
}

/* INPUT */

#input-row{
    padding:15px;
    border-top:1px solid rgba(255,255,255,.08);
}

.input-wrapper{
    display:flex;
    align-items:center;
    gap:10px;

    background:#111827;
    border-radius:18px;
    padding:10px;
}

#user-input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    color:white;
    font-size:14px;
}

#user-input::placeholder{
    color:#64748b;
}

#send-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    cursor:pointer;

    background:linear-gradient(
        135deg,
        #8b5cf6,
        #06b6d4
    );

    color:white;
    font-size:18px;
}

#send-btn:hover{
    transform:scale(1.05);
}

/* TYPING */

.typing{
    display:flex;
    gap:5px;
}

.typing span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#8b5cf6;

    animation:bounce 1s infinite;
}

.typing span:nth-child(2){
    animation-delay:.2s;
}

.typing span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-5px);
    }
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#475569;
    border-radius:20px;
}

@media(max-width:520px){

    body{
        padding:0;
    }

    #app{
        width:100%;
        height:100vh;
        border-radius:0;
    }
}
</style>
</head>

<body>

<div id="app">

    <div id="header">

        <div class="logo">
            <div class="logo-icon">AI</div>

            <div>
                <h3>AI Assistant</h3>
                <p>Powered by Groq</p>
            </div>
        </div>

        <div class="status">● Online</div>

    </div>

    <div id="messages">

        <div class="msg bot">

            <div class="avatar bot-avatar">AI</div>

            <div class="bubble">
                👋 Hello! I'm your AI Assistant.
                Ask me anything.
            </div>

        </div>

    </div>

    <div id="suggestions">

        <button class="chip" onclick="sendChip(this)">
            What is Machine Learning?
        </button>

        <button class="chip" onclick="sendChip(this)">
            Explain Neural Networks
        </button>

        <button class="chip" onclick="sendChip(this)">
            What is an API?
        </button>

    </div>

    <div id="input-row">

        <div class="input-wrapper">

            <input
                type="text"
                id="user-input"
                placeholder="Message AI Assistant..."
            >

            <button id="send-btn" onclick="handleSend()">
                ➤
            </button>

        </div>

    </div>

</div>

<script>

const msgs = document.getElementById('messages');
const input = document.getElementById('user-input');
const btn = document.getElementById('send-btn');

const history = [];

function scrollBottom(){
    msgs.scrollTop = msgs.scrollHeight;
}

function addMsg(role,text){

    const wrap=document.createElement('div');
    wrap.className='msg '+role;

    const avatar=document.createElement('div');
    avatar.className=
        'avatar '+
        (role==='user'
        ?'user-avatar'
        :'bot-avatar');

    avatar.textContent=
        role==='user'
        ?'U'
        :'AI';

    const bubble=document.createElement('div');
    bubble.className='bubble';
    bubble.textContent=text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);

    msgs.appendChild(wrap);

    scrollBottom();
}

function addTyping(){

    const wrap=document.createElement('div');
    wrap.className='msg bot';
    wrap.id='typing';

    wrap.innerHTML=`
    <div class="avatar bot-avatar">AI</div>
    <div class="bubble">
        <div class="typing">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>`;

    msgs.appendChild(wrap);

    scrollBottom();
}

function removeTyping(){
    const t=document.getElementById('typing');
    if(t) t.remove();
}

async function sendMessage(text){

    if(!text.trim()) return;

    input.value='';

    addMsg('user',text);

    history.push({
        role:'user',
        content:text
    });

    addTyping();

    btn.disabled=true;

    try{

        const response=await fetch('/chat',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({
                messages:history
            })

        });

        const data=await response.json();

        removeTyping();

        const reply=
            data.reply ||
            'No response received';

        addMsg('bot',reply);

        history.push({
            role:'assistant',
            content:reply
        });

    }
    catch(error){

        removeTyping();

        addMsg(
            'bot',
            'Unable to connect to server.'
        );

        console.error(error);
    }

    btn.disabled=false;
}

function handleSend(){
    sendMessage(input.value);
}

function sendChip(el){
    sendMessage(el.textContent);
}

input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
        handleSend();
    }
});

</script>

</body>
</html>
